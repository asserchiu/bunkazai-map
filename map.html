<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Designated Cultural Properties Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5/dist/MarkerCluster.Default.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────── */

    #sidebar {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #ddd;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #ddd;
    }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
    }

    #sidebar-header p {
      margin-top: 3px;
      font-size: 11px;
      color: #888;
    }

    #tile-selector {
      padding: 8px 16px;
      border-bottom: 1px solid #ddd;
    }

    #tile-selector label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    #tile-selector select {
      width: 100%;
      padding: 5px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fafafa;
      font-size: 12px;
      cursor: pointer;
    }

    #controls {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid #ddd;
    }

    #controls button {
      flex: 1;
      padding: 5px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fafafa;
      cursor: pointer;
      font-size: 12px;
    }

    #controls button:hover { background: #f0f0f0; }

    #category-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      list-style: none;
    }

    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      cursor: pointer;
      user-select: none;
    }

    .cat-item:hover { background: #f5f5f5; }

    .cat-item input[type="checkbox"] {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--cat-color);
    }

    .cat-dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cat-color);
    }

    .cat-name { flex: 1; line-height: 1.4; }

    .cat-count {
      flex-shrink: 0;
      font-size: 11px;
      color: #888;
      font-variant-numeric: tabular-nums;
    }

    .cat-item.disabled { cursor: default; }
    .cat-item.disabled:hover { background: none; }
    .cat-item.disabled .cat-dot { background: #d0d0d0; }
    .cat-item.disabled .cat-name { color: #bbb; }
    .cat-item.disabled .cat-count { color: #ccc; }

    /* ── Search section ──────────────────────────────────── */

    #search-section {
      border-top: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #search-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid #eee;
    }

    #search-header > span {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #888;
    }

    #search-header button {
      padding: 3px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fafafa;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }

    #search-header button:hover { background: #f0f0f0; }

    #conditions { padding: 4px 0; }

    .condition-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 12px;
    }

    .field-select {
      flex-shrink: 0;
      width: 90px;
      padding: 4px 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fafafa;
      font-size: 12px;
      cursor: pointer;
    }

    .term-input {
      flex: 1;
      min-width: 0;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }

    .term-input:focus { outline: none; border-color: #999; }

    .remove-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: #aaa;
      line-height: 1;
      border-radius: 3px;
    }

    .remove-btn:hover { background: #eee; color: #555; }

    #search-count {
      padding: 4px 16px;
      font-size: 11px;
      color: #888;
      min-height: 22px;
    }

    #result-list {
      list-style: none;
      overflow-y: auto;
      max-height: 250px;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }

    .result-item:hover { background: #f5f5f5; }

    .result-dot {
      flex-shrink: 0;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-top: 4px;
    }

    .result-name {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
    }

    .result-meta {
      font-size: 11px;
      color: #999;
    }

    #sidebar-footer {
      padding: 10px 16px;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #ddd;
      line-height: 1.6;
    }

    #sidebar-footer a { color: #777; text-decoration: none; }
    #sidebar-footer a:hover { text-decoration: underline; }

    /* ── Map ──────────────────────────────────────────────── */

    #map { flex: 1; }

    /* ── Popup ────────────────────────────────────────────── */

    .popup-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .popup-building { font-size: 12px; color: #666; margin-bottom: 6px; }
    .popup-cat {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 3px;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .popup-meta { font-size: 12px; color: #555; }
    .popup-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #1a6bc1;
      text-decoration: none;
    }
    .popup-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Japan Designated Cultural Properties</h1>
    <p>国指定文化財等データベース</p>
  </div>
  <div id="tile-selector">
    <label for="tile-select">Base map</label>
    <select id="tile-select"></select>
  </div>
  <div id="controls">
    <button id="btn-all">Select All</button>
    <button id="btn-none">Deselect All</button>
  </div>
  <ul id="category-list" role="list"></ul>
  <div id="search-section">
    <div id="search-header">
      <span>Search</span>
      <button id="clear-conditions">Clear all</button>
      <button id="add-condition">+ Add</button>
    </div>
    <div id="conditions"></div>
    <div id="search-count"></div>
    <ul id="result-list"></ul>
  </div>
  <div id="sidebar-footer">
    Data:
    <a href="https://kunishitei.bunka.go.jp/" target="_blank" rel="noopener">文化庁 国指定文化財等データベース</a><br>
    Map tiles: <span id="tile-attribution"></span>
  </div>
</aside>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5/dist/leaflet.markercluster.js"></script>
<script>
// ── Tile providers ─────────────────────────────────────────────────────────
const TILE_PROVIDERS = [
  {
    label: 'CartoDB Voyager',
    url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19,
  },
  {
    label: 'CartoDB Light',
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19,
  },
  {
    label: 'GSI 淡色地図',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18,
  },
  {
    label: 'GSI 標準地図',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18,
  },
  {
    label: 'GSI 空拍 (航空写真)',
    url: 'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18,
  },
  {
    label: 'Esri World Topo',
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
    attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community',
    maxZoom: 19,
  },
  {
    label: 'Esri Satellite',
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
    maxZoom: 19,
  },
];

// ── Category definitions ───────────────────────────────────────────────────
const CATEGORIES = [
  { name: '国宝・重要文化財（建造物）',                        color: '#c0392b' },
  { name: '登録有形文化財(建造物)',                             color: '#e67e22' },
  { name: '重要伝統的建造物群保存地区',                         color: '#922b21' },
  { name: '国宝・重要文化財（美術工芸品）',                     color: '#6c3483' },
  { name: '登録有形文化財（美術工芸品）',                       color: '#a569bd' },
  { name: '登録美術品',                                         color: '#d7bde2' },
  { name: '重要有形民俗文化財',                                 color: '#1a5276' },
  { name: '登録有形民俗文化財',                                 color: '#2e86c1' },
  { name: '重要無形民俗文化財',                                 color: '#7fb3d3' },
  { name: '登録無形民俗文化財',                                 color: '#aed6f1' },
  { name: '記録作成等の措置を講ずべき無形の民俗文化財',         color: '#85c1e9' },
  { name: '重要無形文化財',                                     color: '#717d7e' },
  { name: '登録無形文化財',                                     color: '#99a3a4' },
  { name: '記録作成等の措置を講ずべき無形文化財',               color: '#b2babb' },
  { name: '選定保存技術',                                       color: '#808b96' },
  { name: '史跡名勝天然記念物',                                 color: '#1e8449' },
  { name: '登録記念物',                                         color: '#52be80' },
  { name: '重要文化的景観',                                     color: '#16a085' },
  { name: '世界遺産',                                           color: '#d4ac0d' },
];

const COLOR_MAP = Object.fromEntries(CATEGORIES.map(c => [c.name, c.color]));

const SEARCH_FIELDS = [
  { value: 'name',       label: 'Name' },
  { value: 'building',   label: 'Building' },
  { value: 'type1',      label: 'Type' },
  { value: 'era',        label: 'Era' },
  { value: 'prefecture', label: 'Prefecture' },
];

// ── State ──────────────────────────────────────────────────────────────────
let activeCategories = new Set(CATEGORIES.map(c => c.name));
const markersByCategory = {};  // category name → L.CircleMarker[]
const clusterGroup = L.markerClusterGroup({
  chunkedLoading: true,
  // At zoom 16+, disable clustering so individual overlapping markers are
  // always reachable. Below that, spiderfy handles same-spot markers at max zoom.
  disableClusteringAtZoom: 16,
  spiderfyOnMaxZoom: true,
  maxClusterRadius: 50,
});

// ── Utilities ──────────────────────────────────────────────────────────────
function esc(v) {
  return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function makePopupHtml(props) {
  const detailUrl = `https://kunishitei.bunka.go.jp/heritage/detail/${props.ledger_id}/${props.item_id}`;
  const catColor = COLOR_MAP[props.category] ?? '#999';
  return `
    <div class="popup-name">${esc(props.name)}</div>
    ${props.building   ? `<div class="popup-building">${esc(props.building)}</div>` : ''}
    <span class="popup-cat" style="background:${catColor}">${esc(props.category)}</span>
    ${props.era        ? `<div class="popup-meta">${esc(props.era)}</div>` : ''}
    ${props.prefecture ? `<div class="popup-meta">${esc(props.prefecture)}</div>` : ''}
    <a class="popup-link" href="${esc(detailUrl)}" target="_blank" rel="noopener">View in database ↗</a>
  `;
}

// ── Map ────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([36.5, 136.5], 5);

// Populate tile selector and manage the active tile layer.
let currentTileLayer = null;

function setTileLayer(index) {
  const p = TILE_PROVIDERS[index];
  if (currentTileLayer) map.removeLayer(currentTileLayer);
  currentTileLayer = L.tileLayer(p.url, { attribution: p.attribution, maxZoom: p.maxZoom });
  currentTileLayer.addTo(map);
  document.getElementById('tile-attribution').innerHTML = p.attribution;
}

const tileSelect = document.getElementById('tile-select');
for (const [i, p] of TILE_PROVIDERS.entries()) {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = p.label;
  tileSelect.appendChild(opt);
}
tileSelect.addEventListener('change', () => setTileLayer(Number(tileSelect.value)));
setTileLayer(0); // default: CartoDB Voyager

map.addLayer(clusterGroup);

// ── Load data ──────────────────────────────────────────────────────────────
async function init() {
  const resp = await fetch('data/features.geojson');
  if (!resp.ok) throw new Error(`Failed to load GeoJSON: ${resp.status}`);
  const geojson = await resp.json();

  // Count features per category for the sidebar badges.
  const counts = {};
  const markersToAdd = [];

  for (const feature of geojson.features) {
    const [lon, lat] = feature.geometry.coordinates;
    const props = feature.properties;
    const color = COLOR_MAP[props.category] ?? '#999';

    const marker = L.circleMarker([lat, lon], {
      radius: 6,
      fillColor: color,
      fillOpacity: 0.88,
      color: '#fff',
      weight: 1.5,
    }).bindPopup(makePopupHtml(props), { maxWidth: 280 });

    marker._props = props;

    if (!markersByCategory[props.category]) markersByCategory[props.category] = [];
    markersByCategory[props.category].push(marker);
    markersToAdd.push(marker);

    counts[props.category] = (counts[props.category] || 0) + 1;
  }

  clusterGroup.addLayers(markersToAdd);
  buildSidebar(counts);
  initSearchUI();
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar(counts) {
  const list = document.getElementById('category-list');

  for (const cat of CATEGORIES) {
    const count = counts[cat.name] || 0;
    const disabled = count === 0;

    const li = document.createElement('li');
    li.className = 'cat-item' + (disabled ? ' disabled' : '');
    li.style.setProperty('--cat-color', cat.color);

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !disabled;
    cb.disabled = disabled;
    cb.dataset.cat = cat.name;

    const dot = document.createElement('span');
    dot.className = 'cat-dot';

    const name = document.createElement('span');
    name.className = 'cat-name';
    name.textContent = cat.name;

    const badge = document.createElement('span');
    badge.className = 'cat-count';
    badge.textContent = count.toLocaleString();

    li.append(cb, dot, name, badge);

    if (!disabled) {
      li.addEventListener('click', (e) => {
        if (e.target === cb) return;
        cb.checked = !cb.checked;
        onToggle(cat.name, cb.checked);
      });
      cb.addEventListener('change', () => onToggle(cat.name, cb.checked));
    }

    list.appendChild(li);
  }

  document.getElementById('btn-all').addEventListener('click',  () => setAll(true));
  document.getElementById('btn-none').addEventListener('click', () => setAll(false));
}

function onToggle(name, checked) {
  if (checked) activeCategories.add(name);
  else activeCategories.delete(name);
  applyFilters();
}

function setAll(checked) {
  for (const cb of document.querySelectorAll('#category-list input[type="checkbox"]:not(:disabled)')) {
    if (cb.checked === checked) continue;
    cb.checked = checked;
    if (checked) activeCategories.add(cb.dataset.cat);
    else activeCategories.delete(cb.dataset.cat);
  }
  applyFilters();
}

// ── Search ─────────────────────────────────────────────────────────────────

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

const debouncedApply = debounce(applyFilters, 200);

function getConditions() {
  return [...document.querySelectorAll('.condition-row')].map(row => ({
    field: row.querySelector('.field-select').value,
    term:  row.querySelector('.term-input').value.trim().toLowerCase(),
  })).filter(c => c.term !== '');
}

function matchesAll(p, conditions) {
  return conditions.every(({ field, term }) =>
    (p[field] ?? '').toLowerCase().includes(term)
  );
}

function applyFilters() {
  const conditions = getConditions();
  const hasSearch = conditions.length > 0;
  const toAdd = [];
  const hits = [];

  for (const [cat, markers] of Object.entries(markersByCategory)) {
    if (!activeCategories.has(cat)) continue;
    for (const m of markers) {
      if (!hasSearch || matchesAll(m._props, conditions)) {
        toAdd.push(m);
        if (hasSearch) hits.push(m);
      }
    }
  }

  clusterGroup.clearLayers();
  clusterGroup.addLayers(toAdd);
  updateResultList(hits, hasSearch);
}

function updateResultList(hits, hasSearch) {
  const countEl = document.getElementById('search-count');
  const list = document.getElementById('result-list');

  if (!hasSearch) {
    countEl.textContent = '';
    list.innerHTML = '';
    return;
  }

  countEl.textContent = hits.length === 0
    ? 'No results'
    : `${hits.length.toLocaleString()} result${hits.length === 1 ? '' : 's'}`;

  list.innerHTML = '';
  const shown = hits.slice(0, 100);
  for (const m of shown) {
    const p = m._props;
    const color = COLOR_MAP[p.category] ?? '#999';

    const li = document.createElement('li');
    li.className = 'result-item';

    const dot = document.createElement('span');
    dot.className = 'result-dot';
    dot.style.background = color;

    const text = document.createElement('div');

    const name = document.createElement('div');
    name.className = 'result-name';
    name.textContent = p.name || '(no name)';

    const meta = document.createElement('div');
    meta.className = 'result-meta';
    meta.textContent = [p.prefecture, p.category].filter(Boolean).join(' · ');

    text.append(name, meta);
    li.append(dot, text);

    li.addEventListener('click', () => {
      clusterGroup.zoomToShowLayer(m, () => m.openPopup());
    });

    list.appendChild(li);
  }

  if (hits.length > 100) {
    const more = document.createElement('li');
    more.style.cssText = 'padding:6px 16px;font-size:11px;color:#aaa;';
    more.textContent = `… and ${(hits.length - 100).toLocaleString()} more`;
    list.appendChild(more);
  }
}

function updateRemoveButtons() {
  const btns = document.querySelectorAll('.remove-btn');
  btns.forEach(btn => { btn.style.visibility = btns.length > 1 ? 'visible' : 'hidden'; });
}

function addConditionRow() {
  const row = document.createElement('div');
  row.className = 'condition-row';

  const sel = document.createElement('select');
  sel.className = 'field-select';
  for (const f of SEARCH_FIELDS) {
    const opt = document.createElement('option');
    opt.value = f.value;
    opt.textContent = f.label;
    sel.appendChild(opt);
  }

  const input = document.createElement('input');
  input.type = 'search';
  input.className = 'term-input';
  input.placeholder = 'keyword…';

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-btn';
  removeBtn.title = 'Remove';
  removeBtn.textContent = '×';
  removeBtn.addEventListener('click', () => {
    row.remove();
    updateRemoveButtons();
    applyFilters();
  });

  sel.addEventListener('change', debouncedApply);
  input.addEventListener('input', debouncedApply);

  row.append(sel, input, removeBtn);
  document.getElementById('conditions').appendChild(row);
  updateRemoveButtons();
}

function initSearchUI() {
  addConditionRow(); // start with one empty row

  document.getElementById('add-condition').addEventListener('click', () => {
    addConditionRow();
    // Focus the new input
    const inputs = document.querySelectorAll('.term-input');
    inputs[inputs.length - 1].focus();
  });

  document.getElementById('clear-conditions').addEventListener('click', () => {
    document.getElementById('conditions').innerHTML = '';
    addConditionRow();
    applyFilters();
  });
}

init().catch(err => console.error('Init failed:', err));
</script>
</body>
</html>
